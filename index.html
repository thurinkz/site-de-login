<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>thur</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="logo">👨🏻‍💻</div>
        <h1>Seja Bem-vindo!</h1>
        <p>Faça login para continuar</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">E-mail</label>
          <div class="input-wrapper">
            <span class="input-icon">📩</span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              autocomplete="email"
              required
            />
          </div>
          <span class="error-msg" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <div class="input-wrapper">
            <span class="input-icon">🔐</span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" id="togglePassword" title="Mostrar/ocultar senha">
              🕶
            </button>
          </div>
          <span class="error-msg" id="passwordError"></span>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe" />
            <span class="checkmark"></span>
            Lembrar de mim
          </label>
          <a href="#" class="forgot-link" id="forgotLink">Esqueci a senha</a>
        </div>

        <div class="alert" id="loginAlert"></div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">Entrar</span>
          <span class="btn-loader hidden" id="btnLoader"></span>
        </button>
      </form>

      <div class="login-footer">
        <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
      </div>

      <div class="demo-hint">
        <strong> Credenciais de demonstração</strong><br />
        E-mail: <code>thur@demonstracao.com</code> — Senha: <code>123456</code><br />
        E-mail: <code>teste@demonstracao.com</code> — Senha: <code>12456</code>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
